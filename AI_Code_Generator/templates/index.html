<!DOCTYPE html>
<html>
<head>
    <title>AI Code Generator</title>
</head>
<body>

    <h2>Nhập yêu cầu bài lập trình</h2>

    <input type="text" id="prompt" style="width: 300px;">
    <button onclick="generateCode()">Tạo Code</button>

    <h3>Kết quả:</h3>
    <pre id="result"></pre>

    <script>
        function generateCode() {
            let prompt = document.getElementById("prompt").value;

            fetch("/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({prompt: prompt})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText = data.code;
            });
        }
    </script>

</body>
</html>
